name: deezer-desktop
title: Deezer Desktop
base: core24
adopt-info: deezer-linux-app
platforms:
  amd64:
    build-on: [amd64, arm64]
    build-for: [amd64]
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]
summary: Online music streaming service
description: |
    An unofficial linux port of the deezer desktop application.
    Access all of your favorite music, and save them offline for later!
grade: stable
confinement: strict
license: Proprietary
contact: https://github.com/aunetx/deezer-linux/issues
issues: https://github.com/aunetx/deezer-linux/issues
source-code: https://github.com/aunetx/deezer-linux
website: https://github.com/aunetx/deezer-linux
icon: dev.aunetx.deezer.svg

apps:
  deezer-desktop:
    command: opt/deezer-desktop/deezer-desktop --no-sandbox
    desktop: usr/share/applications/deezer-desktop.desktop
    common-id: dev.aunetx.deezer
    extensions: [gnome]
    plugs:
      - audio-playback
      - unity7
      - network
      - network-bind
      - screen-inhibit-control
      - home
      - removable-media
      - browser-support
      - opengl
      - upower-observe
      - alsa
      - avahi-observe

slots:
  deezer-mpris:
    interface: mpris
    name: deezer

plugs:
  shared-memory:
    private: true

parts:
  deezer-linux-app:
    plugin: nil
    override-build: |
      if [ "$CRAFT_ARCH_TRIPLET_BUILD_FOR" = "x86_64-linux-gnu" ]; then
        DEB_FILE=$(ls "$CRAFT_PROJECT_DIR"/artifacts/x64/*.deb | head -1)
      elif [ "$CRAFT_ARCH_TRIPLET_BUILD_FOR" = "aarch64-linux-gnu" ]; then
        DEB_FILE=$(ls "$CRAFT_PROJECT_DIR"/artifacts/arm64/*.deb | head -1)
      fi

      dpkg-deb -x "$DEB_FILE" "$CRAFT_PART_INSTALL"
      chmod -R a+rX "$CRAFT_PART_INSTALL"
      VERSION=$(echo "$(basename "$DEB_FILE")" | cut -d'_' -f2)
      craftctl set version="$VERSION"
    prime:
      - usr
      - opt
